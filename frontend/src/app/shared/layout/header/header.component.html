<header class="sticky top-0 z-50 h-[74px]">

    <!-- top glass bar -->
    <div class="relative border-b border-slate-200/70 bg-white/70 backdrop-blur-xl
           shadow-[0_1px_0_rgba(15,23,42,0.06)]">
        <!-- faint glow strip (premium) -->
        <div class="pointer-events-none absolute inset-x-0 -top-10 h-24 opacity-60
             bg-[radial-gradient(ellipse_at_top,rgba(56,189,248,0.10),transparent_55%)]"></div>

        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6">
            <!-- Left -->
            <div class="flex items-center gap-3">
                <!-- ✅ Sidebar toggle (solo mobile) -->
                <button type="button" (click)="sidebarToggle.emit()" class="lg:hidden inline-flex items-center gap-2 rounded-xl border border-slate-200/70 bg-white/70 px-3 py-2
                 backdrop-blur-xl shadow-[0_1px_0_rgba(15,23,42,0.06)]
                 hover:bg-white hover:border-slate-300
                 focus:outline-none focus:ring-2 focus:ring-sky-400/35" aria-label="Abrir menú">
                    <svg class="h-5 w-5 text-slate-700" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd"
                            d="M3 5.75A.75.75 0 013.75 5h12.5a.75.75 0 010 1.5H3.75A.75.75 0 013 5.75zM3 10a.75.75 0 01.75-.75h12.5a.75.75 0 010 1.5H3.75A.75.75 0 013 10zm0 4.25a.75.75 0 01.75-.75h12.5a.75.75 0 010 1.5H3.75a.75.75 0 01-.75-.75z"
                            clip-rule="evenodd" />
                    </svg>
                </button>

                <app-header-brand [brand]="brand" [logoText]="logoText"></app-header-brand>
            </div>

            <!-- Center (desktop) -->
            <!-- <app-header-nav class="hidden lg:block" [nav]="nav"></app-header-nav> -->

            <!-- Right -->
            <div class="flex items-center gap-2">
                <app-header-search class="hidden md:block"></app-header-search>

                <button type="button" (click)="createClicked.emit()" class="hidden sm:inline-flex items-center justify-center rounded-xl bg-slate-900 px-3.5 py-2 text-sm font-semibold text-white
                 shadow-[0_10px_20px_rgba(15,23,42,0.12)]
                 transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-400/40">
                    Nuevo
                </button>

                <app-header-user-menu [open]="userMenuOpen" [userName]="userName" [userEmail]="userEmail"
                    (toggle)="toggleUserMenu()" (profile)="profileClicked.emit(); closeMenus()"
                    (org)="orgClicked.emit(); closeMenus()"
                    (logout)="logoutClicked.emit(); closeMenus()"></app-header-user-menu>


            </div>
        </div>
    </div>

    <!-- Mobile panel -->
    <app-header-mobile-panel *ngIf="mobileOpen" [nav]="nav" [orgName]="orgName" (org)="orgClicked.emit(); closeMenus()"
        (create)="createClicked.emit(); closeMenus()" (profile)="profileClicked.emit(); closeMenus()"
        (close)="closeMenus()"></app-header-mobile-panel>
</header>
