<div class="relative">
    <button
        type="button"
        (click)="toggle.emit()"
        class="inline-flex items-center gap-2 rounded-xl border border-slate-200/70 bg-white/60 px-2.5 py-2
            backdrop-blur-xl shadow-[0_1px_0_rgba(15,23,42,0.06)]
            transition hover:bg-white hover:border-slate-300
            focus:outline-none focus:ring-2 focus:ring-sky-400/40"
    >
        <div class="grid h-8 w-8 place-items-center rounded-lg bg-slate-900 text-white text-xs font-bold">
        {{ initial() }}
        </div>

        <div class="hidden sm:block text-left">
            <div class="text-xs font-semibold text-slate-900 leading-4">
                {{ userName || 'Usuario' }}
            </div>
            <div class="text-[11px] text-slate-500 leading-4">
                {{ userEmail || 'cuenta@correo.com' }}
            </div>
        </div>

        <svg class="h-4 w-4 text-slate-500 hidden sm:block" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd"
                d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.24a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z"
                clip-rule="evenodd"
            />
        </svg>
    </button>

    <div
        *ngIf="open"
        class="absolute right-0 mt-2 w-56 overflow-hidden rounded-2xl border border-slate-200/70 bg-white/80
            backdrop-blur-xl shadow-[0_20px_50px_rgba(15,23,42,0.16)]"
    >
        <div class="px-3 py-3">
            <div class="text-xs font-semibold text-slate-900">{{ userName || 'Usuario' }}</div>
                <div class="text-[11px] text-slate-500">{{ userEmail || 'cuenta@correo.com' }}</div>
            </div>

            <div class="h-px bg-slate-200/70"></div>

            <button class="w-full px-3 py-2 text-left text-sm text-slate-700 hover:bg-slate-900/[0.04]"  
                (click)="profile.emit()"
                type="button"
            >
                Perfil
            </button>

            <button type="button" (click)="org.emit()"
                class="w-full px-3 py-2 text-left text-sm text-slate-700 hover:bg-slate-900/[0.04]">
                Cambiar organización
            </button>

        <div class="h-px bg-slate-200/70"></div>

        <button type="button" (click)="logout.emit()"
            class="w-full px-3 py-2 text-left text-sm text-red-600 hover:bg-red-500/5">
            Cerrar sesión
        </button>
    </div>
</div>
