<button
    type="button"
    (click)="toggle.emit()"
    class="inline-flex items-center justify-center rounded-xl border border-slate-200/70 bg-white/60 p-2
        backdrop-blur-xl shadow-[0_1px_0_rgba(15,23,42,0.06)]
        transition hover:bg-white hover:border-slate-300
        focus:outline-none focus:ring-2 focus:ring-sky-400/40"
    aria-label="Abrir menú"
>
    <svg *ngIf="!open" class="h-5 w-5 text-slate-700" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd"
        d="M3 5.75A.75.75 0 013.75 5h12.5a.75.75 0 010 1.5H3.75A.75.75 0 013 5.75zM3 10a.75.75 0 01.75-.75h12.5a.75.75 0 010 1.5H3.75A.75.75 0 013 10zm0 4.25a.75.75 0 01.75-.75h12.5a.75.75 0 010 1.5H3.75a.75.75 0 01-.75-.75z"
        clip-rule="evenodd"
        />
    </svg>

    <svg *ngIf="open" class="h-5 w-5 text-slate-700" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd"
        d="M4.47 4.47a.75.75 0 011.06 0L10 8.94l4.47-4.47a.75.75 0 111.06 1.06L11.06 10l4.47 4.47a.75.75 0 11-1.06 1.06L10 11.06l-4.47 4.47a.75.75 0 11-1.06-1.06L8.94 10 4.47 5.53a.75.75 0 010-1.06z"
        clip-rule="evenodd"
    /> </svg>
</button>
