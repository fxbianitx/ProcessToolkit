<div
  class="rounded-2xl border border-slate-200/70 bg-white/60 p-2.5
         backdrop-blur-xl shadow-[0_1px_0_rgba(15,23,42,0.06)]"
  [class.p-2]="collapsed"
>
  <div class="flex items-center gap-2.5" [class.justify-center]="collapsed">
    <div class="grid h-10 w-10 place-items-center rounded-xl bg-slate-900 text-white text-xs font-bold">
      {{ initial() }}
    </div>

    <div *ngIf="!collapsed" class="min-w-0">
      <div class="text-sm font-semibold text-slate-900 truncate">
        {{ userName || 'Usuario' }}
      </div>
      <div class="text-[11px] text-slate-500 truncate">
        {{ userEmail || 'cuenta@correo.com' }}
      </div>
    </div>
  </div>

  <div class="mt-2 grid grid-cols-2 gap-2" *ngIf="!collapsed">
    <button
      type="button"
      (click)="profileClicked.emit()"
      class="rounded-xl border border-slate-200/70 bg-white/60 px-3 py-2 text-sm font-semibold text-slate-800
             hover:bg-white hover:border-slate-300
             focus:outline-none focus:ring-2 focus:ring-sky-400/35"
    >
      Perfil
    </button>

    <button
      type="button"
      (click)="logoutClicked.emit()"
      class="rounded-xl border border-slate-200/70 bg-white/60 px-3 py-2 text-sm font-semibold text-red-600
             hover:bg-red-500/5 hover:border-red-200/60
             focus:outline-none focus:ring-2 focus:ring-red-500/20"
    >
      Salir
    </button>
  </div>

  <button
    *ngIf="collapsed"
    type="button"
    (click)="logoutClicked.emit()"
    class="mt-2 w-full grid place-items-center rounded-xl border border-slate-200/70 bg-white/60 p-2
           hover:bg-red-500/5 hover:border-red-200/60"
    aria-label="Cerrar sesión"
  >
    <svg class="h-5 w-5 text-red-600" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd"
        d="M3.75 3.5A1.75 1.75 0 015.5 1.75h5a.75.75 0 010 1.5h-5A.25.25 0 005.25 3.5v13a.25.25 0 00.25.25h5a.75.75 0 010 1.5h-5A1.75 1.75 0 013.75 16.5v-13zm9.72 3.97a.75.75 0 011.06 0l3 3a.75.75 0 010 1.06l-3 3a.75.75 0 11-1.06-1.06l1.72-1.72H8.5a.75.75 0 010-1.5h6.69l-1.72-1.72a.75.75 0 010-1.06z"
        clip-rule="evenodd"
      />
    </svg>
  </button>
</div>
