<div class="fixed inset-0 z-[60] lg:hidden">
  <!-- overlay -->
  <button
    type="button"
    class="absolute inset-0 bg-slate-900/25 backdrop-blur-[2px]"
    (click)="close.emit()"
    aria-label="Cerrar"
  ></button>

  <!-- panel -->
  <div
    class="absolute left-3 top-3 bottom-3 w-[86%] max-w-[360px]
           rounded-3xl border border-slate-200/70 bg-white/80 backdrop-blur-xl
           shadow-[0_30px_80px_rgba(15,23,42,0.25)]"
  >
    <div class="relative h-full overflow-hidden p-3">
      <div
        class="pointer-events-none absolute -top-14 left-1/2 h-40 w-[520px] -translate-x-1/2 opacity-60
               bg-[radial-gradient(ellipse_at_top,rgba(56,189,248,0.14),transparent_60%)]"
      ></div>

      <div class="relative flex h-full flex-col">
        <div class="flex items-center justify-between">
          <app-sidebar-brand [brand]="brand" [logoText]="logoText" [collapsed]="false"></app-sidebar-brand>

          <button
            type="button"
            (click)="close.emit()"
            class="grid h-10 w-10 place-items-center rounded-xl border border-slate-200/70 bg-white/60
                   hover:bg-white hover:border-slate-300"
            aria-label="Cerrar"
          >
            <svg class="h-5 w-5 text-slate-700" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd"
                d="M4.47 4.47a.75.75 0 011.06 0L10 8.94l4.47-4.47a.75.75 0 111.06 1.06L11.06 10l4.47 4.47a.75.75 0 11-1.06 1.06L10 11.06l-4.47 4.47a.75.75 0 11-1.06-1.06L8.94 10 4.47 5.53a.75.75 0 010-1.06z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
        </div>

        <div class="mt-3">
          <app-sidebar-org-switcher
            [orgName]="orgName"
            [collapsed]="false"
            (orgClicked)="orgClicked.emit(); close.emit()"
          ></app-sidebar-org-switcher>
        </div>

        <div class="mt-3 flex-1 overflow-auto pr-1">
          <app-sidebar-nav [nav]="nav" [collapsed]="false"></app-sidebar-nav>
        </div>

        <div class="mt-3">
          <app-sidebar-cta (createClicked)="createClicked.emit(); close.emit()"></app-sidebar-cta>
        </div>

        <div class="mt-3">
          <app-sidebar-user-card
            [collapsed]="false"
            [userName]="userName"
            [userEmail]="userEmail"
            (profileClicked)="profileClicked.emit(); close.emit()"
            (logoutClicked)="logoutClicked.emit(); close.emit()"
          ></app-sidebar-user-card>
        </div>
      </div>
    </div>
  </div>
</div>
