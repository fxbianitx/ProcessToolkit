<button
  type="button"
  (click)="createClicked.emit()"
  class="w-full inline-flex items-center justify-center gap-2 rounded-2xl bg-slate-900 px-3.5 py-2.5
         text-sm font-semibold text-white
         shadow-[0_10px_20px_rgba(15,23,42,0.14)]
         hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-400/40"
  [class.h-12]="collapsed"
>
  <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
    <path fill-rule="evenodd"
      d="M10 4a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 0110 4z"
      clip-rule="evenodd"
    />

  <span *ngIf="!collapsed">Nuevo</span>
</button>
