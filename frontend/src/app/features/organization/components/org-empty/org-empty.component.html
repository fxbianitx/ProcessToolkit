<div class="rounded-2xl border border-slate-200/70 bg-white/65 p-8 text-center
    backdrop-blur-xl shadow-[0_1px_0_rgba(15,23,42,0.06),0_12px_28px_rgba(15,23,42,0.06)]"
>
    <div
        class="mx-auto mb-4 grid h-12 w-12 place-items-center rounded-2xl
            border border-slate-200/70 bg-white/70"
    >
        <!-- placeholder icon (opcional) -->
        <span class="h-2 w-2 rounded-full bg-sky-500/70"></span>
    </div>

    <h3 class="text-base font-semibold text-slate-900">
        {{ title }}
    </h3>

    <p class="mx-auto mt-2 max-w-md text-sm leading-6 text-slate-600">
        {{ description }}
    </p>

    <div class="mt-6 flex justify-center">
        <button
        type="button"
        (click)="onCreate()"
        class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white
                shadow-[0_10px_20px_rgba(15,23,42,0.12)]
                transition hover:bg-slate-800
                focus:outline-none focus:ring-2 focus:ring-sky-400/40"
        >
            Crear organización
        </button>
    </div>
</div>
