<div class="relative min-h-screen overflow-hidden bg-slate-50 text-slate-900">
    <!-- Base suave -->
    <div class="pointer-events-none absolute inset-0 bg-gradient-to-b from-white via-slate-50 to-slate-100"></div>

    <!-- Glow superior (cian, muy sutil en claro) -->
    <div class="pointer-events-none absolute inset-0 opacity-60
           bg-[radial-gradient(ellipse_at_top,rgba(56,189,248,0.14),transparent_58%)]"></div>

    <!-- Glow secundario (indigo) -->
    <div class="pointer-events-none absolute inset-0 opacity-40
           bg-[radial-gradient(ellipse_at_bottom,rgba(99,102,241,0.10),transparent_60%)]"></div>

    <!-- Grid sutil -->
    <div class="pointer-events-none absolute inset-0 opacity-[0.18]
           bg-[linear-gradient(to_right,rgba(15,23,42,0.06)_1px,transparent_1px),linear-gradient(to_bottom,rgba(15,23,42,0.06)_1px,transparent_1px)]
           bg-[size:72px_72px]"></div>

    <!-- Grain (textura fina) -->
    <div class="pointer-events-none absolute inset-0 opacity-[0.06]
           [background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22%3E%3Cfilter id=%22n%22 x=%220%22 y=%220%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%222%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22160%22 height=%22160%22 filter=%22url(%23n)%22 opacity=%220.28%22/%3E%3C/svg%3E')]">
    </div>

    <!--  -->
    <div class="relative mx-auto w-full px-4 pt-6 sm:px-6">

        <app-card-content>
            <h1 class="text-2xl font-semibold tracking-[-0.02em] text-slate-900 sm:text-3xl">
                {{ title }}
            </h1>
            <p *ngIf="subtitle" class="mt-2 text-sm leading-6 text-slate-600">
                {{ subtitle }}
            </p>
        </app-card-content>

        <app-card-content className="mt-4">
            <ng-content />
        </app-card-content>

    </div>
</div>
