<app-org-shell
  title="Organizaciones"
  subtitle="Selecciona una organización para continuar o crea una nueva."
>
  <app-org-section-head
    title="Tus organizaciones"
    description="Accede al dashboard, reglas y auditoría por organización."
    [secondaryLabel]="'Unirse a organización'"
    (secondary)="showJoin()"
    [actionLabel]="'Crear organización'"
    (action)="goCreate()"
  ></app-org-section-head>

  <!-- ✅ Panel Unirse -->
  <app-org-join-panel *ngIf="view === 'join'" (back)="showList()"></app-org-join-panel>

  <!-- ✅ Lista normal -->
  <ng-container *ngIf="view === 'list'">
    <!-- Loading -->
    <div
      *ngIf="loading"
      class="rounded-2xl border border-slate-200/70 bg-white/65 p-6 text-slate-700 backdrop-blur-xl shadow-[0_1px_0_rgba(15,23,42,0.06),0_12px_28px_rgba(15,23,42,0.06)]"
    >
      <div class="flex items-center gap-3">
        <div class="h-5 w-5 animate-spin rounded-full border-2 border-slate-300 border-t-slate-900"></div>
        <span class="text-sm">Cargando organizaciones…</span>
      </div>
    </div>

    <!-- Empty -->
    <app-org-empty *ngIf="!loading && orgs.length === 0" (create)="goCreate()"></app-org-empty>

    <!-- List -->
    <div *ngIf="!loading && orgs.length > 0" class="grid gap-4 sm:grid-cols-2">
      <app-org-card
        *ngFor="let item of orgs"
        [org]="item"
        (selected)="select($event)"
      ></app-org-card>
    </div>

    <div class="mt-6 text-xs text-slate-500">
      Próximamente: unirse por código, solicitudes y aprobaciones por owner/admin.
    </div>
  </ng-container>
</app-org-shell>
